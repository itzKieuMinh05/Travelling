version: "3.9"

# =============================================================
#  AIRBNB LAKEHOUSE PIPELINE — docker-compose.yml
#  Stack: Kafka · MinIO · Spark · dbt · Airflow · Trino · Superset
# =============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "your-fernet-key-here-generate-with-python"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "your-secret-key-here"
    # Kết nối MinIO (S3)
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_DEFAULT_REGION: us-east-1
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
  zookeeper_data:
  kafka_data:

services:
  gravitino:
    image: apache/gravitino:0.6.1
    container_name: gravitino
    networks: [lakehouse]
    ports:
      - "8090:8090"   # Gravitino Web UI
      - "9001:9001"   # Iceberg REST endpoint
    environment:
      GRAVITINO_SERVER_SHUTDOWN_TIMEOUT: "3000"
      # Backend: PostgreSQL
      GRAVITINO_ENTITY_STORE: kv
      GRAVITINO_ENTITY_STORE_KV: RocksDB
      # Dùng JVM opts để pass config file
      JAVA_TOOL_OPTIONS: >-
        -Dgravitino.server.shutdown.timeout=3000
        -Dgravitino.entity.store=relational
        -Dgravitino.entity.store.relational.jdbcUrl=jdbc:postgresql://postgres:5432/gravitino
        -Dgravitino.entity.store.relational.jdbcDriver=org.postgresql.Driver
        -Dgravitino.entity.store.relational.jdbcUser=airflow
        -Dgravitino.entity.store.relational.jdbcPassword=airflow
        -Dgravitino.iceberg-rest.dml-write-mode=rest
        -Dgravitino.auxService.names=iceberg-rest
        -Dgravitino.iceberg-rest.host=0.0.0.0
        -Dgravitino.iceberg-rest.httpPort=9001
        -Dgravitino.iceberg-rest.catalog-backend=hive
        -Dgravitino.iceberg-rest.warehouse=s3://iceberg-warehouse/
        -Dgravitino.iceberg-rest.io-impl=org.apache.iceberg.aws.s3.S3FileIO
        -Dgravitino.iceberg-rest.s3-endpoint=http://minio:9000
        -Dgravitino.iceberg-rest.s3-access-key-id=minioadmin
        -Dgravitino.iceberg-rest.s3-secret-access-key=minioadmin
        -Dgravitino.iceberg-rest.s3-path-style-access=true
        -Dgravitino.iceberg-rest.s3-region=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/version"]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
  # ─────────────────────────────────────────
  # 1. ZOOKEEPER (Kafka cần)
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [lakehouse]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. KAFKA BROKER
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: travelling_kafka
    networks: [lakehouse]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Fix: tách rõ INTERNAL (docker) vs EXTERNAL (host)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168

      # Thêm để tránh lỗi khởi động chậm
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      # Dùng INTERNAL port 29092 để check bên trong container
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 45s  # Kafka + Zookeeper cần thời gian
  # Kafka UI — xem topic/message trực quan
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [lakehouse]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: airbnb-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────────────────────────────────
  # 3. MINIO — Object Storage (S3-compatible)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: travelling_minio
    networks: [lakehouse]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init — tạo bucket bronze/silver/gold
  minio-init:
    image: minio/mc:latest
    container_name: travelling_minio-init
    networks: [lakehouse]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/iceberg-warehouse;
      echo 'Buckets created: bronze, silver, gold, iceberg-warehouse';
      "

  # ─────────────────────────────────────────
  # 4. POSTGRES — metadata store cho Airflow & Hive Metastore
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: travelling_postgres
    networks: [lakehouse]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # 5. SPARK — xử lý Bronze → Silver
  # ─────────────────────────────────────────
  spark-master:
    build: ./spark   # bạn cần có Dockerfile trong ./spark
    container_name: travelling_spark-master
    networks: [lakehouse]
    ports:
      - "7077:7077"
      - "8081:8080"   # giữ giống config cũ của bạn
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data

  spark-worker:
    build: ./spark
    container_name: spark-worker
    networks: [lakehouse]
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/spark-data
  # ─────────────────────────────────────────
  # 6. TRINO — Query Engine (query Iceberg tables)
  # ─────────────────────────────────────────
  trino:
    image: trinodb/trino:446
    container_name: travelling_trino
    networks: [lakehouse]
    ports:
      - "8083:8080"     # host:container
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config.properties:/etc/trino/config.properties
      - ./trino/jvm.config:/etc/trino/jvm.config
      - ./trino/node.properties:/etc/trino/node.properties
    depends_on:
      gravitino:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]  # dùng port container, không phải host
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  # ─────────────────────────────────────────
  # 7. DBT — transformation Silver → Gold
  # ─────────────────────────────────────────
  dbt:
    build: ./dbt
    container_name: travelling_dbt
    networks: [lakehouse]
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    entrypoint: ["tail", "-f", "/dev/null"]

  # ─────────────────────────────────────────
  # 8. AIRFLOW — Orchestration
  # ─────────────────────────────────────────
  
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    networks: [lakehouse]
    command: >
      bash -c "airflow db upgrade && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    networks: [lakehouse]
    ports:
      - "8085:8080"   # Airflow UI
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    networks: [lakehouse]
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # 9. APACHE SUPERSET — BI Dashboard
  # ─────────────────────────────────────────
  superset:
    image: apache/superset:3.1.3
    container_name: travelling_superset
    networks: [lakehouse]
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "your-superset-secret-key"
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads --reload
      "
